<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divas & Shot | Y2K Scene FPS</title>
    <link rel="stylesheet" href="style.css?v=6">
    <!-- Google Fonts for Y2K vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Press+Start+2P&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Overlay de Menu -->
    <div id="game-menu">
        <div class="menu-content">
            <!-- Olhos no Fundo -->
            <div class="eyes-bg">
                <div class="eye-shape eye-left"></div>
                <div class="eye-shape eye-right"></div>
            </div>

            <h1 class="glitch" data-text="DIVAS & SHOT">DIVAS <span class="ampersand">&</span> SHOT</h1>

            <div class="subtitle-container">
                <span class="diamond">✧</span>
                <p class="subtitle">SCENE QUEEN EDITION</p>
                <span class="diamond">✧</span>
            </div>

            <div class="menu-buttons">
                <button id="start-button" class="menu-btn">
                    <span>START</span>
                    <span class="icon">❯</span>
                </button>
                <button id="shop-button" class="menu-btn">
                    <span>SHOP</span>
                    <span class="icon">🛒</span>
                </button>
                <button id="config-button" class="menu-btn">
                    <span>CONFIG</span>
                    <span class="icon">⚙️</span>
                </button>
            </div>

            <div class="controls-hint">
                <span class="diamond-small">✧</span> MOUSE: MOVER | CLICK: ATIRAR | ESC: PAUSAR <span
                    class="diamond-small">✧</span>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over">
        <div class="game-over-content">
            <h2 class="game-over-title">GAME OVER</h2>
            <p class="game-over-sub">você foi derrubada pelas divarzinhas 💀</p>
            <button id="restart-button" class="menu-btn">
                <span>VOLTAR AO MENU</span>
                <span class="icon">↩</span>
            </button>
        </div>
    </div>

    <!-- Inventory Overlay -->
    <div id="inventory">
        <div class="inventory-panel">
            <div class="inv-header">
                <h2 class="inv-title">✦ INVENTÁRIO ✦</h2>
                <span class="inv-close">[I] FECHAR</span>
            </div>
            <div class="inv-grid">
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
                <div class="inv-slot"></div>
            </div>
            <p class="inv-empty-msg">nenhum item coletado ainda...</p>
        </div>
    </div>

    <!-- HUD do Jogo -->
    <div id="hud" style="display: none;">
        <div class="score-container">
            SCORE: <span id="score-value">000000</span>
        </div>
        <div class="hotbar-container">
            <div class="hotbar-slot active" id="slot-1"><span class="slot-num">1</span><span class="slot-item">SWORD</span></div>
            <div class="hotbar-slot" id="slot-2"><span class="slot-num">2</span><span class="slot-item">GUN</span></div>
            <div class="hotbar-slot" id="slot-3"><span class="slot-num">3</span></div>
            <div class="hotbar-slot" id="slot-4"><span class="slot-num">4</span></div>
            <div class="hotbar-slot" id="slot-5"><span class="slot-num">5</span></div>
            <div class="hotbar-slot" id="slot-6"><span class="slot-num">6</span></div>
        </div>
        <div class="crosshair"></div>
    </div>

    <!-- Container do Three.js -->
    <div id="canvas-container"></div>

    <!-- Scripts -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>

</html>
